<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotsCreator - Editor de Notas Musicales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p { color: #a0a0a0; font-size: 1.1rem; }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary { background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%); color: white; }
        .btn-secondary { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); color: white; border: 2px solid #e94560; }
        .btn-success { background: linear-gradient(135deg, #00d9ff 0%, #00b4d8 100%); color: #1a1a2e; }

        .instruments {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .instrument-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .instrument-btn.active {
            background: #e94560;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .sheet-container {
            background: #f5f5dc;
            background-size: 100% 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
            overflow-x: auto;
            position: relative;
            min-height: 400px;
            border: 1px solid #d4c4a8;
        }

        .timeline {
            display: flex;
            align-items: center;
            min-width: 2000px;
            height: 200px;
            position: relative;
            padding: 0 50px;
        }

        .staff-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #5c4033;
            left: 0;
        }

        .staff-line:nth-child(1) { top: 40px; }
        .staff-line:nth-child(2) { top: 70px; }
        .staff-line:nth-child(3) { top: 100px; }
        .staff-line:nth-child(4) { top: 130px; }
        .staff-line:nth-child(5) { top: 160px; }

        .clef {
            position: absolute;
            left: 20px;
            top: 30px;
            font-size: 80px;
            color: #5c4033;
            z-index: 10;
        }

        .note-slot {
            width: 60px;
            height: 180px;
            position: relative;
            cursor: pointer;
        }

        .note {
            position: absolute;
            width: 24px;
            height: 20px;
            background: #1a1a2e;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
        }

        .note::before {
            content: '';
            position: absolute;
            width: 3px;
            height: 40px;
            background: inherit;
            right: -3px;
            top: -35px;
        }

        .note.guitar { background: #ff6b6b; }
        .note.bass { background: #4ecdc4; }
        .note.drums { background: #ffe66d; }
        .note.piano { background: #a8e6cf; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #e94560;
            color: white;
        }

        .playback-indicator {
            position: absolute;
            width: 3px;
            height: 100%;
            background: #00d9ff;
            left: 0;
            top: 0;
            display: none;
            z-index: 100;
        }

        .playback-indicator.active {
            display: block;
            animation: movePlayback linear forwards;
        }

        @keyframes movePlayback {
            from { left: 0; }
            to { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>♪ NotsCreator ♪</h1>
        <p>Editor Profesional de Partituras Musicales</p>
    </div>

    <div class="main-container">
        <div class="instruments">
            <button class="instrument-btn active" data-instrument="guitar">🎸 Guitarra</button>
            <button class="instrument-btn" data-instrument="bass">🎸 Bajo</button>
            <button class="instrument-btn" data-instrument="drums">🥁 Batería</button>
            <button class="instrument-btn" data-instrument="piano">🎹 Piano</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="clearSheet()">🗑️ Limpiar</button>
            <button class="btn btn-secondary" onclick="showSaveModal()">💾 Guardar</button>
            <button class="btn btn-success" onclick="playComposition()">▶️ Reproducir</button>
            <div style="color: white; display: flex; align-items: center; gap: 10px;">
                <span>Tempo:</span>
                <input type="number" id="tempo" value="120" style="width: 50px;">
            </div>
        </div>

        <div class="sheet-container" id="sheetContainer">
            <div class="playback-indicator" id="playbackIndicator"></div>
            <div class="timeline" id="timeline">
                <div class="clef">𝄞</div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                </div>
        </div>

        <div class="saved-songs" style="margin-top: 30px; color: white;">
            <h3>🎼 Mis Composiciones</h3>
            <div id="songList"></div>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h3>Guardar Canción</h3>
            <input type="text" id="songName" placeholder="Nombre..." style="margin: 10px 0; padding: 5px;">
            <button onclick="saveSong()">Confirmar</button>
            <button onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
